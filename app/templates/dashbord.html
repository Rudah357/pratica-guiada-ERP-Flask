<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 30px;
            flex: 1;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #333333;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            background-color: #fcfcfc;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: #007bff;
        }

        .card p {
            margin: 0;
            color: #666666;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="card-container">

        <a href="{{ url_for('web.listar_produtos_view') }}" class="card">
            <h3>Produtos</h3>
            <p>Gerenciar e listar produtos</p>
        </a>

        <a href="{{ url_for('web.listar_categorias_view') }}" class="card">
            <h3>Categorias</h3>
            <p>Organizar as categorias</p>
        </a>

        <a href="{{ url_for('web.listar_usuarios_view') }}" class="card">
            <h3>Usuários</h3>
            <p>Controle de usuários</p>
        </a>

    </div>

</body>
</html>
